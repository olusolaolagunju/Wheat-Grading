# Ultralytics AGPL-3.0 License
# YOLO11 + AFPN neck — default P3/P4/P5 three-scale detection
#
# AFPN replaces the entire PAN neck with asymptotic fusion:
#   Stage 1: Fuse adjacent P3 + P4 first (small semantic gap)
#   Stage 2: Incorporate P5 into the already-fused features
#   ASF2 (Adaptive Spatial Fusion) resolves per-location feature conflicts
#   AFPNUp (1x1 conv + bilinear) replaces nn.Upsample — channels aligned BEFORE upsample
#   AFPNDown (kxk strided conv) replaces strided Conv — paper-accurate downsampling
#
# Paper: Yang et al., "AFPN: Asymptotic Feature Pyramid Network", arXiv 2306.15988
# "YOLO only inputs {C3,C4,C5} into the feature pyramid, generating {P3,P4,P5}"

nc: 80
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00,  512]
  l: [1.00, 1.00,  512]
  x: [1.00, 1.50,  512]

# ── Backbone (UNCHANGED) ──────────────────────────────────────────────────────
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,   [64, 3, 2]]             # 0  P1/2
  - [-1, 1, Conv,   [128, 3, 2]]            # 1  P2/4
  - [-1, 2, C3k2,   [256, False, 0.25]]     # 2
  - [-1, 1, Conv,   [256, 3, 2]]            # 3  P3/8
  - [-1, 2, C3k2,   [512, False, 0.25]]     # 4  <- P3 (256ch unscaled)
  - [-1, 1, Conv,   [512, 3, 2]]            # 5  P4/16
  - [-1, 2, C3k2,   [512, True]]            # 6  <- P4 (512ch unscaled)
  - [-1, 1, Conv,   [1024, 3, 2]]           # 7  P5/32
  - [-1, 2, C3k2,   [1024, True]]           # 8
  - [-1, 1, SPPF,   [1024, 5]]             # 9
  - [-1, 2, C2PSA,  [1024]]                # 10 <- P5 (1024ch unscaled)

# ── Head (AFPN neck) ──────────────────────────────────────────────────────────
# Channel annotations use UNSCALED values (parse_model applies width multiplier)
head:

  # ── Stage 1: Fuse P3 + P4 (adjacent levels, small semantic gap) ───────────
  #
  # P4 → P3 scale path:
  - [6,       1, AFPNUp,    [256]]          # 11  P4(512→256) bilinear to P3 scale
  - [[-1, 4], 1, ASF2,      [256]]          # 12  adaptive fuse up(P4) + P3 → P3_s1
  - [-1,      1, BasicBlock, [256]]         # 13  refine P3_s1  ← Stage-1 P3

  # P3 → P4 scale path:
  - [4,       1, AFPNDown,  [512]]          # 14  P3(256→512) strided to P4 scale
  - [[-1, 6], 1, ASF2,      [512]]          # 15  adaptive fuse down(P3) + P4 → P4_s1
  - [-1,      1, BasicBlock, [512]]         # 16  refine P4_s1  ← Stage-1 P4

  # ── Stage 2: Incorporate P5 (top-level features) ──────────────────────────
  #
  # P5 → P4 scale, fuse with Stage-1 P4:
  - [10,       1, AFPNUp,    [512]]         # 17  P5(1024→512) bilinear to P4 scale
  - [[-1, 16], 1, ASF2,      [512]]         # 18  adaptive fuse up(P5) + P4_s1 → P4_s2
  - [-1,       1, BasicBlock, [512]]        # 19  P4 FINAL OUTPUT (medium objects)

  # P4_s2 → P3 scale, fuse with Stage-1 P3:
  - [19,       1, AFPNUp,    [256]]         # 20  P4_s2(512→256) bilinear to P3 scale
  - [[-1, 13], 1, ASF2,      [256]]         # 21  adaptive fuse up(P4_s2) + P3_s1
  - [-1,       1, BasicBlock, [256]]        # 22  P3 FINAL OUTPUT (small objects)

  # Stage-1 P4 → P5 scale, fuse with original P5:
  - [16,       1, AFPNDown,  [1024]]        # 23  P4_s1(512→1024) strided to P5 scale
  - [[-1, 10], 1, ASF2,      [1024]]        # 24  adaptive fuse down(P4_s1) + P5
  - [-1,       1, BasicBlock, [1024]]       # 25  P5 FINAL OUTPUT (large objects)

  # ── Detection ──────────────────────────────────────────────────────────────
  # P3 (layer 22) → small objects   80×80
  # P4 (layer 19) → medium objects  40×40
  # P5 (layer 25) → large objects   20×20
  - [[22, 19, 25], 1, Detect, [nc]]         # 26