# YOLO11 + SlimNeck — default P3/P4/P5 three-scale detection
#
# SlimNeck changes vs default YOLO11 neck (head only, backbone unchanged):
#   C3k2  → VoVGSCSP  in ALL neck feature-fusion positions
#   Conv (strided, bottom-up) → GSConv  in bottom-up downsampling steps
#   nn.Upsample stays unchanged — SlimNeck paper keeps standard upsample
#
# Paper: Li et al., "Slim-neck by GSConv", arXiv 2206.02424
# "Use SC in backbone and GSConv in neck to keep accuracy and infer fast."

nc: 80
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00,  512]
  l: [1.00, 1.00,  512]
  x: [1.00, 1.50,  512]

# ── Backbone (UNCHANGED — paper explicitly keeps standard SC backbone) ─────────
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,   [64, 3, 2]]             # 0  P1/2
  - [-1, 1, Conv,   [128, 3, 2]]            # 1  P2/4
  - [-1, 2, C3k2,   [256, False, 0.25]]     # 2
  - [-1, 1, Conv,   [256, 3, 2]]            # 3  P3/8
  - [-1, 2, C3k2,   [512, False, 0.25]]     # 4  <- P3 lateral
  - [-1, 1, Conv,   [512, 3, 2]]            # 5  P4/16
  - [-1, 2, C3k2,   [512, True]]            # 6  <- P4 lateral
  - [-1, 1, Conv,   [1024, 3, 2]]           # 7  P5/32
  - [-1, 2, C3k2,   [1024, True]]           # 8
  - [-1, 1, SPPF,   [1024, 5]]             # 9
  - [-1, 2, C2PSA,  [1024]]                # 10 <- P5 attention-enriched

# ── Head (SlimNeck) ────────────────────────────────────────────────────────────
head:

  # Top-down path: semantic info flows DOWN
  # Upsample unchanged — SlimNeck only touches conv and CSP blocks

  - [-1,       1, nn.Upsample,  [None, 2, "nearest"]]  # 11  P5 20x20 -> 40x40
  - [[-1, 6],  1, Concat,       [1]]                   # 12  cat backbone P4
  - [-1,       2, VoVGSCSP,     [512, False]]           # 13  fused P4  (was C3k2)

  - [-1,       1, nn.Upsample,  [None, 2, "nearest"]]  # 14  P4 40x40 -> 80x80
  - [[-1, 4],  1, Concat,       [1]]                   # 15  cat backbone P3
  - [-1,       2, VoVGSCSP,     [256, False]]           # 16  P3/8-small  (was C3k2)

  # Bottom-up path: spatial detail flows UP
  # GSConv replaces strided Conv — SC+DSC blend preserves cross-channel info

  - [-1,       1, GSConv,       [256, 3, 2]]            # 17  P3 80x80 -> 40x40 (was Conv)
  - [[-1, 13], 1, Concat,       [1]]                   # 18  cat head P4
  - [-1,       2, VoVGSCSP,     [512, False]]           # 19  P4/16-medium (was C3k2)

  - [-1,       1, GSConv,       [512, 3, 2]]            # 20  P4 40x40 -> 20x20 (was Conv)
  - [[-1, 10], 1, Concat,       [1]]                   # 21  cat head P5
  - [-1,       2, VoVGSCSP,     [1024, True]]           # 22  P5/32-large  (was C3k2)

  # Detection
  - [[16, 19, 22], 1, Detect,   [nc]]                  # 23  P3 + P4 + P5