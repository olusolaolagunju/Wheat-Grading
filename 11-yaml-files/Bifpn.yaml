# Ultralytics AGPL-3.0 License
# YOLO11 + BiFPN neck — default P3/P4/P5 three-scale detection
#
# BiFPN change vs default YOLO11 neck:
#   All 4 Concat layers → BiFPN_Concat2 (weighted fusion, 2 inputs each)
#   Everything else unchanged — backbone, C3k2, upsample, strided Conv, Detect
#
# Paper: Tan et al., "EfficientDet: Scalable and Efficient Object Detection"
#        CVPR 2020. https://arxiv.org/abs/1911.09070
#
# BiFPN_Concat2 replaces Concat because all YOLO11 neck fusion nodes
# take exactly 2 inputs. BiFPN_Concat3 is not needed here — it is only
# required for full EfficientDet-style intermediate nodes with 3 inputs.

nc: 80
scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00,  512]
  l: [1.00, 1.00,  512]
  x: [1.00, 1.50,  512]

# ── Backbone (UNCHANGED) ──────────────────────────────────────────────────────
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,   [64, 3, 2]]             # 0  P1/2
  - [-1, 1, Conv,   [128, 3, 2]]            # 1  P2/4
  - [-1, 2, C3k2,   [256, False, 0.25]]     # 2
  - [-1, 1, Conv,   [256, 3, 2]]            # 3  P3/8
  - [-1, 2, C3k2,   [512, False, 0.25]]     # 4  <- P3 lateral
  - [-1, 1, Conv,   [512, 3, 2]]            # 5  P4/16
  - [-1, 2, C3k2,   [512, True]]            # 6  <- P4 lateral
  - [-1, 1, Conv,   [1024, 3, 2]]           # 7  P5/32
  - [-1, 2, C3k2,   [1024, True]]           # 8
  - [-1, 1, SPPF,   [1024, 5]]             # 9
  - [-1, 2, C2PSA,  [1024]]                # 10 <- P5 attention-enriched

# ── Head (BiFPN neck) ─────────────────────────────────────────────────────────
head:

  # Top-down path: semantic info flows DOWN
  # Upsample unchanged — BiFPN only touches the fusion (Concat) nodes

  - [-1,       1, nn.Upsample,    [None, 2, "nearest"]]  # 11  P5 20x20 -> 40x40
  - [[-1, 6],  1, BiFPN_Concat2,  [1]]                   # 12  weighted fuse P4 (was Concat)
  - [-1,       2, C3k2,           [512, False]]           # 13  fused P4

  - [-1,       1, nn.Upsample,    [None, 2, "nearest"]]  # 14  P4 40x40 -> 80x80
  - [[-1, 4],  1, BiFPN_Concat2,  [1]]                   # 15  weighted fuse P3 (was Concat)
  - [-1,       2, C3k2,           [256, False]]           # 16  P3/8-small

  # Bottom-up path: spatial detail flows UP

  - [-1,       1, Conv,           [256, 3, 2]]            # 17  P3 80x80 -> 40x40
  - [[-1, 13], 1, BiFPN_Concat2,  [1]]                   # 18  weighted fuse P4 (was Concat)
  - [-1,       2, C3k2,           [512, False]]           # 19  P4/16-medium

  - [-1,       1, Conv,           [512, 3, 2]]            # 20  P4 40x40 -> 20x20
  - [[-1, 10], 1, BiFPN_Concat2,  [1]]                   # 21  weighted fuse P5 (was Concat)
  - [-1,       2, C3k2,           [1024, True]]           # 22  P5/32-large

  # Detection
  - [[16, 19, 22], 1, Detect,     [nc]]                  # 23  P3 + P4 + P5