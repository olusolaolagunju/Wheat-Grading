# Ultralytics AGPL-3.0 License
# YOLO11 + CBAM attention in backbone — default P3/P4/P5 three-scale detection
#
# CBAM placement based on diagram (Frontiers plant science paper):
#   Inserted AFTER C3k2 at P3 and P4 levels in backbone
#   NOT after every C3k2 — targeted at the two most semantically rich scales
#   before features enter the neck
#
# Paper: Woo et al., "CBAM: Convolutional Block Attention Module", ECCV 2018
# "CBAM sequentially infers channel and spatial attention maps,
#  then multiplies them to the input feature map for adaptive refinement"
#
# CBAM is channel-preserving — input and output channels identical
# No changes to neck or head — backbone modification only

nc: 80
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00,  512]
  l: [1.00, 1.00,  512]
  x: [1.00, 1.50,  512]

# ── Backbone with CBAM ────────────────────────────────────────────────────────
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,   [64, 3, 2]]              # 0  P1/2
  - [-1, 1, Conv,   [128, 3, 2]]             # 1  P2/4
  - [-1, 2, C3k2,   [256, False, 0.25]]      # 2
  - [-1, 1, Conv,   [256, 3, 2]]             # 3  P3/8
  - [-1, 2, C3k2,   [512, False, 0.25]]      # 4
  - [-1, 1, ECA,   [512]]                   # 5  CBAM after P3 C3k2 ← P3 level
  - [-1, 1, Conv,   [512, 3, 2]]             # 6  P4/16
  - [-1, 2, C3k2,   [512, True]]             # 7
  - [-1, 1, ECA,   [512]]                   # 8  CBAM after P4 C3k2 ← P4 level
  - [-1, 1, Conv,   [1024, 3, 2]]            # 9  P5/32
  - [-1, 2, C3k2,   [1024, True]]            # 10
  - [-1, 1, SPPF,   [1024, 5]]              # 11
  - [-1, 2, C2PSA,  [1024]]                 # 12 <- P5

# ── Head (default YOLO11 PAN — UNCHANGED) ─────────────────────────────────────
# Layer indices shift by 2 due to the two CBAM insertions
# P4 lateral is now layer 8 (was 6), P3 lateral is now layer 5 (was 4)
head:
  - [-1,       1, nn.Upsample,  [None, 2, "nearest"]]  # 13  P5 20x20 -> 40x40
  - [[-1, 8],  1, Concat,       [1]]                   # 14  cat backbone P4 (layer 8)
  - [-1,       2, C3k2,         [512, False]]           # 15  fused P4

  - [-1,       1, nn.Upsample,  [None, 2, "nearest"]]  # 16  P4 40x40 -> 80x80
  - [[-1, 5],  1, Concat,       [1]]                   # 17  cat backbone P3 (layer 5)
  - [-1,       2, C3k2,         [256, False]]           # 18  P3/8-small

  - [-1,       1, Conv,         [256, 3, 2]]            # 19  P3 80x80 -> 40x40
  - [[-1, 15], 1, Concat,       [1]]                   # 20  cat head P4 (layer 15)
  - [-1,       2, C3k2,         [512, False]]           # 21  P4/16-medium

  - [-1,       1, Conv,         [512, 3, 2]]            # 22  P4 40x40 -> 20x20
  - [[-1, 12], 1, Concat,       [1]]                   # 23  cat head P5 (layer 12)
  - [-1,       2, C3k2,         [1024, True]]           # 24  P5/32-large

  # Detection
  - [[18, 21, 24], 1, Detect,   [nc]]                  # 25  P3 + P4 + P5